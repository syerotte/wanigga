<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>For My Favorite Person 💌</title>
    <meta name="description" content="A tiny corner of the internet made with a lot of love." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <nav class="site-nav">
      <a href="index.html" class="brand">wanigga 💌</a>
      <div class="nav-links">
        <a href="index.html" class="active">Home</a>
        <a href="story.html">Our Story</a>
        <a href="memories.html">Memories</a>
        <a href="reasons.html">Why You</a>
        <a href="letter.html">Love Note</a>
      </div>
    </nav>

    <!-- HERO -->
    <section class="hero">
      <p class="hero-eyebrow">I have one very important question</p>
      <h1>Will you be with me<br>forever? 💍</h1>
      <p class="hero-sub">Please, please, please — pwetty pweaseeeee.</p>

      <img
        class="hero-photo"
        src="assets/cat/WhatsApp Image 2026-07-02 at 11.59.57 PM.jpeg"
        alt="Two cats cuddling"
      />

      <div class="proposal-wrap" id="proposal-actions">
        <button class="yes-btn" id="yes-btn" type="button">Yes! 💖</button>
        <button class="no-btn"  id="no-btn"  type="button">No</button>
      </div>
      <p class="proposal-result" id="proposal-result" aria-live="polite"></p>
    </section>

    <footer>
      <p>© <span id="year"></span> Made by danigga with love (and questionable coding skills) ♡</p>
    </footer>

    <div class="celebration" id="celebration" aria-hidden="true"></div>

    <!-- AUDIO -->
    <audio id="bg-audio" loop>
      <source src="assets/music/mrld - An Art Gallery Could Never Be As Unique As You (Official Audio).mp3" type="audio/mpeg" />
    </audio>

    <!-- MUSIC PLAYER -->
    <div class="music-player" id="music-player">
      <button class="music-btn" id="music-btn" aria-label="Play music">
        <span class="music-icon" id="music-icon">▶</span>
      </button>
      <div class="music-label">
        <span class="music-title">An Art Gallery Could Never Be As Unique As You</span>
        <span class="music-artist">mrld</span>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
